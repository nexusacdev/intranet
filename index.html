    <style>
      body {
        background-color: #222222;
        color: #FFFFFF;
        scroll-behavior: smooth;
      }

        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #222222;
      }
      ::-webkit-scrollbar-thumb {
        background: #333333;

      }
      ::-webkit-scrollbar-thumb:hover {

      }

        background: rgba(51, 51, 51, 0.7);

        }
        * {
          -webkit-print-color-adjust: exact !important;
